<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro de horas extra</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F1F4F2; --panel:#FFFFFF; --ink:#152420; --ink-soft:#5C6B66; --line:#DCE4E0;
    --brand:#136251; --brand-soft:#E2EFEA;
    --ot:#B9750F; --ot-soft:#F8EEDA;
    --def:#B23B2A; --def-soft:#F9E7E3;
    --ok:#1D7A45; --ok-soft:#E3F2E8;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Barlow',system-ui,sans-serif;padding-bottom:70px}
  header{background:var(--ink);color:#F4F7F5;padding:26px 22px}
  .wrap{max-width:960px;margin:0 auto;padding:0 18px}
  h1{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:29px;margin:0;line-height:1.1}
  .sub{margin-top:6px;font-size:14.5px;color:#B9C6C1;max-width:600px}
  h2{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:21px;margin:28px 0 12px}
  .panel{background:var(--panel);border-radius:12px;padding:18px}
  .grid{display:grid;gap:12px}
  .form-grid{grid-template-columns:repeat(auto-fit,minmax(150px,1fr));align-items:end}
  label{display:block;font-size:12.5px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:5px}
  input,select{width:100%;padding:10px 11px;border:1.5px solid var(--line);border-radius:9px;font-family:inherit;font-size:14.5px;background:#fff;color:var(--ink)}
  input:focus,select:focus,button:focus-visible{outline:3px solid var(--brand);outline-offset:1px;border-color:var(--brand)}
  .btn{background:var(--brand);color:#fff;border:none;border-radius:10px;padding:12px 20px;font-size:14.5px;font-weight:600;cursor:pointer;font-family:inherit}
  .btn.secondary{background:#fff;color:var(--brand);border:1.5px solid var(--brand);padding:10px 16px}
  .btn.danger{background:#fff;color:var(--def);border:1.5px solid var(--def);padding:6px 12px;font-size:13px;border-radius:8px}
  .btn:disabled{background:#9DB5AD;cursor:default}
  .cards{grid-template-columns:repeat(auto-fit,minmax(180px,1fr));margin-top:14px}
  .card{border-radius:12px;padding:15px 17px}
  .card .lbl{font-size:12px;font-weight:600;letter-spacing:.04em;text-transform:uppercase}
  .card .val{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:29px;margin-top:3px;font-variant-numeric:tabular-nums}
  .card .det{font-size:13px;color:var(--ink-soft);margin-top:2px}
  table{border-collapse:collapse;width:100%}
  th{text-align:left;font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft);font-weight:600;padding:9px 11px;border-bottom:1px solid var(--line);white-space:nowrap}
  td{padding:9px 11px;border-bottom:1px solid var(--line);font-size:14px;font-variant-numeric:tabular-nums}
  tr:last-child td{border-bottom:none}
  .chip{border-radius:999px;padding:3px 10px;font-size:12.5px;font-weight:600;white-space:nowrap;display:inline-block}
  .num-ot{color:var(--ot);font-weight:600}
  .num-def{color:var(--def);font-weight:600}
  .muted{color:var(--ink-soft)}
  .msg{border-radius:10px;padding:11px 15px;font-size:14px;margin-top:12px;display:none}
  .msg.err{background:var(--def-soft);color:var(--def);display:block}
  .msg.ok{background:var(--ok-soft);color:var(--ok);display:block}
  .filters{grid-template-columns:repeat(auto-fit,minmax(160px,1fr));align-items:end;margin-bottom:14px}
  .empty{font-size:14px;color:var(--ink-soft);padding:14px 4px}
  .table-scroll{overflow:auto}
  .row-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:14px}
  @media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>

<header>
  <div class="wrap">
    <h1>Registro de horas extra</h1>
    <div class="sub">Anota las horas de cada persona por posición y fecha. Se guarda automáticamente: verás quién hizo extras, quién salió antes, y cuántas horas quedan pendientes de pagar.</div>
  </div>
</header>

<main class="wrap">

  <!-- Formulario -->
  <h2>Añadir registro</h2>
  <div class="panel">
    <div class="grid form-grid">
      <div><label for="f-fecha">Fecha</label><input type="date" id="f-fecha"></div>
      <div><label for="f-nombre">Nombre</label><input type="text" id="f-nombre" placeholder="Ej. María López"></div>
      <div><label for="f-rol">Posición</label>
        <select id="f-rol">
          <option value="server">Server</option>
          <option value="kitchen">Kitchen</option>
          <option value="supervisor">Supervisor</option>
          <option value="bartender">Bartender</option>
          <option value="host">Host</option>
          <option value="otro">Otro</option>
        </select>
      </div>
      <div><label for="f-trab">Horas trabajadas</label><input type="number" id="f-trab" min="0" step="0.25" placeholder="Ej. 9.5"></div>
      <div><label for="f-prog">Horas programadas</label><input type="number" id="f-prog" min="0" step="0.25" value="8"></div>
      <div><button class="btn" id="btn-add" onclick="agregar()">Guardar registro</button></div>
    </div>
    <div class="msg" id="form-msg"></div>
  </div>

  <!-- Filtros -->
  <h2>Resumen</h2>
  <div class="panel">
    <div class="grid filters">
      <div><label for="q-nombre">Filtrar por nombre</label><input type="text" id="q-nombre" placeholder="Todos" oninput="render()"></div>
      <div><label for="q-desde">Desde</label><input type="date" id="q-desde" onchange="render()"></div>
      <div><label for="q-hasta">Hasta</label><input type="date" id="q-hasta" onchange="render()"></div>
      <div><button class="btn secondary" onclick="limpiarFiltros()">Quitar filtros</button></div>
    </div>

    <div class="grid cards" id="cards"></div>
  </div>

  <!-- Por posición -->
  <h2>Horas extra y salidas por posición</h2>
  <div class="panel table-scroll" id="por-rol"></div>

  <!-- Por persona -->
  <h2>Acumulado por persona</h2>
  <div class="panel table-scroll" id="por-persona"></div>

  <!-- Registros -->
  <h2>Registros guardados</h2>
  <div class="panel table-scroll">
    <div id="tabla-registros"></div>
    <div class="row-actions">
      <button class="btn secondary" onclick="document.getElementById('csv-input').click()">Importar CSV</button>
      <input type="file" id="csv-input" accept=".csv,text/csv" style="display:none" onchange="importarCSV(this.files[0])">
      <button class="btn secondary" onclick="exportarCSV()">Exportar CSV</button>
      <button class="btn danger" onclick="borrarTodo()">Borrar todos los datos</button>
    </div>
    <div class="msg" id="csv-msg"></div>
  </div>

</main>

<script>
const KEY = "registros-horas";
const ROLES = {
  server:{label:"Server",color:"#136251"},
  kitchen:{label:"Kitchen",color:"#B9750F"},
  supervisor:{label:"Supervisor",color:"#4A4E9E"},
  bartender:{label:"Bartender",color:"#8A3D6E"},
  host:{label:"Host",color:"#2A6F8A"},
  otro:{label:"Otro",color:"#5C6B66"},
};
let registros = [];

const fmt = n => {
  const v = Math.round(n*100)/100;
  return (v % 1 === 0 ? v : v.toFixed(2)) + " h";
};
const esc = s => String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

async function cargar(){
  try{
    const r = localStorage.getItem(KEY);
    registros = r ? JSON.parse(r) : [];
  }catch(e){ registros = []; }
  render();
}

async function persistir(){
  try{
    localStorage.setItem(KEY, JSON.stringify(registros));
    return true;
  }catch(e){
    mostrarMsg("No se pudo guardar en este navegador (\u00bfmodo inc\u00f3gnito o sin espacio?).","err");
    return false;
  }
}

function mostrarMsg(t, tipo){
  const m = document.getElementById("form-msg");
  m.textContent = t; m.className = "msg " + tipo;
  clearTimeout(m._t); m._t = setTimeout(()=>{ m.className = "msg"; }, 4000);
}

async function agregar(){
  const fecha = document.getElementById("f-fecha").value;
  const nombre = document.getElementById("f-nombre").value.trim();
  const rol = document.getElementById("f-rol").value;
  const trab = parseFloat(document.getElementById("f-trab").value);
  const prog = parseFloat(document.getElementById("f-prog").value);
  if(!fecha){ mostrarMsg("Falta la fecha.","err"); return; }
  if(!nombre){ mostrarMsg("Falta el nombre.","err"); return; }
  if(isNaN(trab) || trab < 0){ mostrarMsg("Indica las horas trabajadas.","err"); return; }
  if(isNaN(prog) || prog < 0){ mostrarMsg("Indica las horas programadas.","err"); return; }

  const extra = Math.max(0, trab - prog);
  const faltantes = Math.max(0, prog - trab);
  registros.push({ id: Date.now() + "-" + Math.random().toString(36).slice(2,7),
    fecha, nombre, rol, trab, prog, extra, faltantes });
  const ok = await persistir();
  if(ok){
    mostrarMsg("Registro guardado: " + nombre + " (" + fecha + ")","ok");
    document.getElementById("f-trab").value = "";
    document.getElementById("f-nombre").value = "";
    render();
  } else { registros.pop(); }
}

async function eliminar(id){
  const prev = registros.slice();
  registros = registros.filter(r => r.id !== id);
  const ok = await persistir();
  if(!ok){ registros = prev; }
  render();
}

async function borrarTodo(){
  if(!confirm("¿Seguro que quieres borrar todos los registros guardados? Esta acción no se puede deshacer.")) return;
  const prev = registros.slice();
  registros = [];
  const ok = await persistir();
  if(!ok){ registros = prev; }
  render();
}

function limpiarFiltros(){
  document.getElementById("q-nombre").value = "";
  document.getElementById("q-desde").value = "";
  document.getElementById("q-hasta").value = "";
  render();
}

function filtrados(){
  const q = document.getElementById("q-nombre").value.trim().toLowerCase();
  const d = document.getElementById("q-desde").value;
  const h = document.getElementById("q-hasta").value;
  return registros.filter(r =>
    (!q || r.nombre.toLowerCase().includes(q)) &&
    (!d || r.fecha >= d) &&
    (!h || r.fecha <= h)
  );
}

function chip(rol){
  const m = ROLES[rol] || ROLES.otro;
  return `<span class="chip" style="background:${m.color}1A;color:${m.color}">${m.label}</span>`;
}

function render(){
  const data = filtrados();
  const totEx = data.reduce((s,r)=>s+r.extra,0);
  const totFa = data.reduce((s,r)=>s+r.faltantes,0);
  const pendiente = Math.max(0, totEx - totFa);
  const persEx = new Set(data.filter(r=>r.extra>0).map(r=>r.nombre)).size;
  const persFa = new Set(data.filter(r=>r.faltantes>0).map(r=>r.nombre)).size;

  // Tarjetas
  document.getElementById("cards").innerHTML = `
    <div class="card" style="background:var(--ot-soft)">
      <div class="lbl" style="color:var(--ot)">Horas extra totales</div>
      <div class="val" style="color:var(--ot)">${fmt(totEx)}</div>
      <div class="det">${persEx} ${persEx===1?"persona":"personas"}</div>
    </div>
    <div class="card" style="background:var(--def-soft)">
      <div class="lbl" style="color:var(--def)">Salidas antes (horas)</div>
      <div class="val" style="color:var(--def)">${fmt(totFa)}</div>
      <div class="det">${persFa} ${persFa===1?"persona":"personas"}</div>
    </div>
    <div class="card" style="background:${pendiente>0?"var(--def-soft)":"var(--ok-soft)"}">
      <div class="lbl" style="color:${pendiente>0?"var(--def)":"var(--ok)"}">Pendiente de pagar</div>
      <div class="val" style="color:${pendiente>0?"var(--def)":"var(--ok)"}">${fmt(pendiente)}</div>
      <div class="det">${pendiente>0
        ? "Horas extra que no se compensan con las salidas anticipadas"
        : "Todo compensado" + (totFa-totEx>0 ? " · sobran " + fmt(totFa-totEx) + " de margen" : "")}</div>
    </div>`;

  // Por posición
  const porRol = {};
  for(const r of data){
    if(!porRol[r.rol]) porRol[r.rol] = {ex:0, fa:0, pers:new Set()};
    porRol[r.rol].ex += r.extra;
    porRol[r.rol].fa += r.faltantes;
    if(r.extra>0) porRol[r.rol].pers.add(r.nombre);
  }
  const rolesConDatos = Object.keys(porRol);
  document.getElementById("por-rol").innerHTML = rolesConDatos.length === 0
    ? `<div class="empty">Todavía no hay datos${registros.length?" con estos filtros":""}. Añade un registro arriba para empezar.</div>`
    : `<table><thead><tr><th>Posición</th><th>Personas con extra</th><th>Horas extra</th><th>Horas por salidas antes</th><th>Balance</th></tr></thead><tbody>` +
      rolesConDatos.map(rol => {
        const v = porRol[rol]; const bal = v.ex - v.fa;
        return `<tr><td>${chip(rol)}</td><td>${v.pers.size}</td>
          <td class="${v.ex>0?"num-ot":"muted"}">${fmt(v.ex)}</td>
          <td class="${v.fa>0?"num-def":"muted"}">${fmt(v.fa)}</td>
          <td class="${bal>0?"num-ot":bal<0?"num-def":"muted"}">${bal>0?"+":""}${fmt(bal)}</td></tr>`;
      }).join("") + `</tbody></table>`;

  // Por persona
  const porPersona = {};
  for(const r of data){
    const k = r.nombre.toLowerCase();
    if(!porPersona[k]) porPersona[k] = {nombre:r.nombre, rol:r.rol, ex:0, fa:0, dias:0};
    porPersona[k].ex += r.extra;
    porPersona[k].fa += r.faltantes;
    porPersona[k].dias += 1;
    porPersona[k].rol = r.rol;
  }
  const personas = Object.values(porPersona).sort((a,b)=>b.ex-a.ex);
  document.getElementById("por-persona").innerHTML = personas.length === 0
    ? `<div class="empty">Sin datos que mostrar.</div>`
    : `<table><thead><tr><th>Nombre</th><th>Posición</th><th>Días registrados</th><th>Horas extra</th><th>Salidas antes</th><th>Balance</th></tr></thead><tbody>` +
      personas.map(p => {
        const bal = p.ex - p.fa;
        return `<tr><td style="font-weight:600">${esc(p.nombre)}</td><td>${chip(p.rol)}</td><td>${p.dias}</td>
          <td class="${p.ex>0?"num-ot":"muted"}">${fmt(p.ex)}</td>
          <td class="${p.fa>0?"num-def":"muted"}">${fmt(p.fa)}</td>
          <td class="${bal>0?"num-ot":bal<0?"num-def":"muted"}">${bal>0?"+":""}${fmt(bal)}</td></tr>`;
      }).join("") + `</tbody></table>`;

  // Registros individuales
  const orden = data.slice().sort((a,b)=> b.fecha.localeCompare(a.fecha));
  document.getElementById("tabla-registros").innerHTML = orden.length === 0
    ? `<div class="empty">No hay registros guardados${registros.length?" con estos filtros":""}.</div>`
    : `<table><thead><tr><th>Fecha</th><th>Nombre</th><th>Posición</th><th>Trabajadas</th><th>Programadas</th><th>Extra</th><th>Salió antes</th><th></th></tr></thead><tbody>` +
      orden.map(r => `<tr>
        <td>${r.fecha}</td><td style="font-weight:600">${esc(r.nombre)}</td><td>${chip(r.rol)}</td>
        <td>${fmt(r.trab)}</td><td>${fmt(r.prog)}</td>
        <td class="${r.extra>0?"num-ot":"muted"}">${fmt(r.extra)}</td>
        <td class="${r.faltantes>0?"num-def":"muted"}">${fmt(r.faltantes)}</td>
        <td><button class="btn danger" onclick="eliminar('${r.id}')">Eliminar</button></td></tr>`).join("") +
      `</tbody></table>`;
}

function msgCSV(t, tipo){
  const m = document.getElementById("csv-msg");
  m.textContent = t; m.className = "msg " + tipo;
  clearTimeout(m._t); m._t = setTimeout(()=>{ m.className = "msg"; }, 6000);
}

function parseLineaCSV(linea){
  const out = []; let cur = ""; let enComillas = false;
  for(let i = 0; i < linea.length; i++){
    const ch = linea[i];
    if(enComillas){
      if(ch === '"' && linea[i+1] === '"'){ cur += '"'; i++; }
      else if(ch === '"'){ enComillas = false; }
      else cur += ch;
    } else {
      if(ch === '"') enComillas = true;
      else if(ch === ',' || ch === ';'){ out.push(cur); cur = ""; }
      else cur += ch;
    }
  }
  out.push(cur);
  return out.map(s => s.trim());
}

async function importarCSV(file){
  if(!file) return;
  try{
    const texto = (await file.text()).replace(/^\uFEFF/, "");
    const lineas = texto.split(/\r?\n/).filter(l => l.trim());
    if(lineas.length < 2){ msgCSV("El CSV no tiene datos.","err"); return; }
    const head = parseLineaCSV(lineas[0]).map(h => h.toLowerCase());
    const iF = head.findIndex(h => h.startsWith("fecha"));
    const iN = head.findIndex(h => h.startsWith("nombre") || h.startsWith("empleado"));
    const iR = head.findIndex(h => h.startsWith("posicion") || h.startsWith("posici") || h.startsWith("rol"));
    const iT = head.findIndex(h => h.includes("trabajada"));
    const iP = head.findIndex(h => h.includes("programada"));
    if(iF < 0 || iN < 0 || iT < 0){
      msgCSV("No reconozco las columnas. El CSV debe tener al menos: Fecha, Nombre, Horas trabajadas (como el que exporta esta pagina).","err");
      return;
    }
    const nuevos = [];
    for(let i = 1; i < lineas.length; i++){
      const c = parseLineaCSV(lineas[i]);
      const fecha = c[iF] || "";
      const nombre = (c[iN] || "").trim();
      const rol = iR >= 0 && ROLES[(c[iR]||"").toLowerCase()] ? c[iR].toLowerCase() : "otro";
      const trab = parseFloat(c[iT]);
      const prog = iP >= 0 ? parseFloat(c[iP]) : NaN;
      if(!/^\d{4}-\d{2}-\d{2}$/.test(fecha) || !nombre || isNaN(trab)) continue;
      const p = isNaN(prog) ? 8 : prog;
      nuevos.push({ id: Date.now() + "-" + Math.random().toString(36).slice(2,7),
        fecha, nombre, rol, trab, prog: p,
        extra: Math.max(0, trab - p), faltantes: Math.max(0, p - trab) });
    }
    if(nuevos.length === 0){ msgCSV("No se encontro ninguna fila valida en el CSV.","err"); return; }
    const prev = registros.slice();
    registros = registros.concat(nuevos);
    const ok = await persistir();
    if(ok){ msgCSV(nuevos.length + " registros importados.","ok"); render(); }
    else { registros = prev; }
  }catch(e){
    msgCSV("No se pudo leer el archivo CSV.","err");
  }finally{
    document.getElementById("csv-input").value = "";
  }
}

function exportarCSV(){
  const data = filtrados();
  if(data.length === 0){ mostrarMsg("No hay registros que exportar.","err"); return; }
  const head = ["Fecha","Nombre","Posicion","Horas trabajadas","Horas programadas","Horas extra","Horas faltantes"];
  const lines = [head.join(",")].concat(data.map(r =>
    [r.fecha, '"'+r.nombre.replace(/"/g,'""')+'"', r.rol, r.trab, r.prog, r.extra, r.faltantes].join(",")));
  const blob = new Blob(["\uFEFF"+lines.join("\n")], {type:"text/csv;charset=utf-8"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "registro-horas.csv";
  a.click();
  URL.revokeObjectURL(a.href);
}

// Fecha de hoy por defecto
document.getElementById("f-fecha").value = new Date().toISOString().slice(0,10);
cargar();
</script>
</body>
</html>
